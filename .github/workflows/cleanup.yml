name: Cleanup

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cleans up gh-pages subdirectory when a feature branch is deleted.
# Triggered on branch deletion (delete event).
on:
  delete:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    # Only run for non-main branch deletions
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Derive branch slug and deploy directory
        id: slug
        run: |
          BRANCH="${{ github.event.ref }}"
          # Replace slashes with dashes for filesystem-safe slug
          SLUG=$(echo "$BRANCH" | tr '/' '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          # feat/* branches use the same shortened deploy directory as deploy.yml
          if [[ "$BRANCH" == feat/* ]]; then
            SHORT=$(echo "${BRANCH#feat/}" | sed 's/\([A-Z]\)[a-z]*/\1/g' | tr -d '-' | head -c 20)
            echo "deploy_dir=feat/$SHORT" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_dir=$SLUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove deployment directory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DIR="${{ steps.slug.outputs.deploy_dir }}"

          if [ -d "$DEPLOY_DIR" ]; then
            echo "Removing deployment directory: $DEPLOY_DIR"
            rm -rf "$DEPLOY_DIR"
          else
            echo "Deployment directory not found: $DEPLOY_DIR (skipping)"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          git commit -m "Remove deployment for deleted branch ${{ steps.slug.outputs.branch }}" || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git push origin gh-pages
