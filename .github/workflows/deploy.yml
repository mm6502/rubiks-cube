name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Deploys to GitHub Pages from main and feature branches.
# - main → gh-pages root (https://mm6502.github.io/rubiks-cube/)
# - feat/* branches → gh-pages/feat/<short>/ (https://mm6502.github.io/rubiks-cube/feat/<short>/)
# - other branches → gh-pages/<branch-slug>/ (https://mm6502.github.io/rubiks-cube/<branch-slug>/)
#
# The app compiles to a single self-contained HTML file — VITE_BASE_PATH is
# always /rubiks-cube/ since there are no relative asset URLs to resolve.
#
# main deploy: triggered after CI quality gate passes on main.
# feature branch deploy: triggered on push to any non-main branch.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive branch slug and deploy directory
        id: slug
        run: |
          BRANCH="${{ github.event.workflow_run && github.event.workflow_run.head_ref || github.ref_name }}"
          # Replace slashes with dashes for filesystem-safe slug
          SLUG=$(echo "$BRANCH" | tr '/' '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          # feat/* branches get a shortened deploy directory (e.g., feat/AnotherGreatFeature → feat/AGF)
          if [[ "$BRANCH" == feat/* ]]; then
            # Take first letter of each PascalCase word after feat/
            SHORT=$(echo "${BRANCH#feat/}" | sed 's/\([A-Z]\)[a-z]*/\1/g' | tr -d '-' | head -c 20)
            # Fallback: if the branch name has no uppercase letters, use first 20 chars of the slug
            if [ -z "$SHORT" ]; then
              SHORT=$(echo "$SLUG" | head -c 20)
            fi
            echo "deploy_dir=feat/$SHORT" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_dir=$SLUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set base path
        run: |
          # App compiles to a single self-contained HTML file — no relative asset URLs.
          # VITE_BASE_PATH is always the root path; only the deploy directory differs.
          echo "VITE_BASE_PATH=/rubiks-cube/" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DIR="${{ steps.slug.outputs.deploy_dir }}"
          publish_dir="$RUNNER_TEMP/gh-pages"
          mkdir -p "$publish_dir"
          cd "$publish_dir"

          # Clone gh-pages into the temp dir to preserve existing deployments
          git init --initial-branch=gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout -b gh-pages origin/gh-pages 2>/dev/null || true
          fi

          # Remove old deployment for this branch, then place new files
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # main → root deployment: clear root (keep subdirectories)
            find . -maxdepth 1 -type f -delete
          else
            # Feature branch → subdirectory deployment
            rm -rf "$DEPLOY_DIR"
          fi
          mkdir -p "$DEPLOY_DIR"
          cp -R "$GITHUB_WORKSPACE/dist/." "$DEPLOY_DIR/"
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          # Determine commit message based on branch type
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT_MSG="Deploy main (${{ github.event.workflow_run.head_sha }})"
          else
            COMMIT_MSG="Deploy ${{ steps.slug.outputs.branch }} (${{ github.sha }})"
          fi

          git commit -m "$COMMIT_MSG" --allow-empty || true
          git push origin gh-pages
