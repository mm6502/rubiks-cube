name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Runs only in the public repo (mm6502/rubiks-cube).
# Triggered automatically after the CI quality gate passes on main.
# Publishes the built site to the gh-pages branch used by GitHub Pages.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$RUNNER_TEMP/gh-pages"
          mkdir -p "$publish_dir"
          cp -R dist/. "$publish_dir/"
          cd "$publish_dir"
          touch .nojekyll
          git init --initial-branch=gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${{ github.event.workflow_run.head_sha }}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
