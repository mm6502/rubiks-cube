name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Deploys to GitHub Pages from main and feature branches.
# - main → gh-pages root (https://mm6502.github.io/rubiks-cube/)
# - feature branches → gh-pages/<branch-slug>/ (https://mm6502.github.io/rubiks-cube/<branch-slug>/)
#
# main deploy: triggered after CI quality gate passes on main.
# feature branch deploy: triggered on push to any non-main branch.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive branch slug
        id: slug
        run: |
          BRANCH="${{ github.event.workflow_run && github.event.workflow_run.head_ref || github.ref_name }}"
          # Replace slashes with dashes for filesystem-safe slug
          SLUG=$(echo "$BRANCH" | tr '/' '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set base path
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # main branch → root deployment
            echo "VITE_BASE_PATH=/rubiks-cube/" >> "$GITHUB_ENV"
          else
            # Feature branch → subdirectory deployment
            echo "VITE_BASE_PATH=/rubiks-cube/${{ steps.slug.outputs.slug }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$RUNNER_TEMP/gh-pages"
          mkdir -p "$publish_dir"
          cp -R dist/. "$publish_dir/"
          cd "$publish_dir"
          touch .nojekyll

          # Initialize gh-pages branch if it doesn't exist
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git init --initial-branch=gh-pages
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          # Determine commit message based on branch type
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT_MSG="Deploy main (${{ github.event.workflow_run.head_sha }})"
          else
            COMMIT_MSG="Deploy ${{ steps.slug.outputs.branch }} (${{ github.sha }})"
          fi

          git commit -m "$COMMIT_MSG" --allow-empty || true

          # Fetch gh-pages from remote to avoid push rejection
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git fetch origin gh-pages 2>/dev/null || true

          # Merge remote gh-pages if it exists (preserves other branch deployments)
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git merge origin/gh-pages --allow-unrelated-histories --no-edit || true
          fi

          git push origin gh-pages
