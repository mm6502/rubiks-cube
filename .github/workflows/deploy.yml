name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Deploys to GitHub Pages from main and feature branches.
# - main → gh-pages root (https://mm6502.github.io/rubiks-cube/)
# - feat/* branches → gh-pages/feat/<initials>/ (https://mm6502.github.io/rubiks-cube/feat/<initials>/)
# - other branches → gh-pages/<branch-slug>/ (https://mm6502.github.io/rubiks-cube/<branch-slug>/)
#
# The app compiles to a single self-contained HTML file — VITE_BASE_PATH is
# always /rubiks-cube/ since there are no relative asset URLs to resolve.
#
# main deploy: triggered after CI quality gate passes on main.
# feature branch deploy: triggered on push to any non-main branch.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive branch slug and deploy directory
        id: slug
        run: |
          BRANCH="${{ github.event.workflow_run && github.event.workflow_run.head_ref || github.ref_name }}"
          # Replace slashes with dashes for filesystem-safe slug
          SLUG=$(echo "$BRANCH" | tr '/' '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          # feat/* branches: abbreviate to initials, always lower case.
          # Works for both PascalCase (e.g., feat/AnotherGreatFeature → feat/agf)
          # and kebab-case (e.g., feat/my-feature → feat/mf).
          if [[ "$BRANCH" == feat/* ]]; then
            SUFFIX="${BRANCH#feat/}"
            # Insert a separator before each uppercase letter, convert to lower case,
            # split on separators, take the first character of each segment.
            SHORT=$(echo "$SUFFIX" | sed 's/\([A-Z]\)/-\1/g' | tr '[:upper:]' '[:lower:]' | tr -- '-_' '\n' | grep -v '^$' | cut -c1 | tr -d '\n' | head -c 20)
            echo "deploy_dir=feat/$SHORT" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_dir=$SLUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set base path
        run: |
          # App compiles to a single self-contained HTML file — no relative asset URLs.
          # VITE_BASE_PATH is always the root path; only the deploy directory differs.
          echo "VITE_BASE_PATH=/rubiks-cube/" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DIR="${{ steps.slug.outputs.deploy_dir }}"
          publish_dir="$RUNNER_TEMP/gh-pages"
          mkdir -p "$publish_dir"
          cd "$publish_dir"

          # Clone gh-pages into the temp dir to preserve existing deployments
          git init --initial-branch=gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout -b gh-pages origin/gh-pages 2>/dev/null || true
          fi

          # Remove old deployment for this branch, then place new files
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # main → root deployment: clear root (keep subdirectories)
            find . -maxdepth 1 -type f -delete
          else
            # Feature branch → subdirectory deployment
            rm -rf "$DEPLOY_DIR"
          fi
          mkdir -p "$DEPLOY_DIR"
          cp -R "$GITHUB_WORKSPACE/dist/." "$DEPLOY_DIR/"
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          # Determine commit message based on branch type
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT_MSG="Deploy main (${{ github.event.workflow_run.head_sha }})"
          else
            COMMIT_MSG="Deploy ${{ steps.slug.outputs.branch }} (${{ github.sha }})"
          fi

          git commit -m "$COMMIT_MSG" --allow-empty || true
          git push origin gh-pages

      - name: Post deployment URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DIR="${{ steps.slug.outputs.deploy_dir }}"
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_URL="https://${OWNER}.github.io/${REPO_NAME}/"
            BRANCH="main"
          else
            DEPLOY_URL="https://${OWNER}.github.io/${REPO_NAME}/${DEPLOY_DIR}/"
            BRANCH="${{ steps.slug.outputs.branch }}"
          fi

          # Always write a job summary so the URL is visible in the workflow run
          {
            echo "## 🚀 Deployed"
            echo ""
            echo "| Field  | Value |"
            echo "| ------ | ----- |"
            echo "| Branch | \`${BRANCH}\` |"
            echo "| URL    | [${DEPLOY_URL}](${DEPLOY_URL}) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Post a PR comment when the push is from a feature branch with an open PR
          if [ "${{ github.event_name }}" = "push" ]; then
            PR_NUMBER=$(curl -sS \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls?head=${OWNER}:${BRANCH}&state=open" \
              | jq -r '.[0].number // empty')

            if [ -n "$PR_NUMBER" ]; then
              BODY=$(jq -n --arg url "$DEPLOY_URL" --arg sha "${{ github.sha }}" \
                '"## 🚀 Branch deployed\n\n**URL:** \($url)\n\n*Commit: `\($sha)`*"')
              curl -sS \
                -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
                -d "{\"body\":${BODY}}" \
                || echo "Warning: failed to post PR comment (non-fatal)"
            fi
          fi
