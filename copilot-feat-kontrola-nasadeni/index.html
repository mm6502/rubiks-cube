  \x3C!--
    Sticker data attributes:
      data-face          — which cube face the sticker belongs to (U/D/L/R/F/B)
      data-pos           — sticker position index within the face (0..8, row-major)
      data-axis-circles  — the two axis circles whose rings intersect at this sticker,
                           encoded as "AXIS:LAYER_INDEX AXIS:LAYER_INDEX"
                           AXIS       : Z | X | Y  (which axis circle)
                           LAYER_INDEX: 0 | 1 | 2  (cube coordinate layer index — visual ring
                                        order depends on the axis: Z:2 is the outermost Z-ring,
                                        but X:0 and Y:0 are the outermost X/Y-rings)
                           Example: "Z:2 X:1" means Z layer 2 (outermost Z-ring) × X layer 1 (middle X-ring)

    Each sticker sits at a geometric intersection of one Z-axis ring and one X- or Y-axis ring
    (faces U/D sit on Z×X; faces L/R and F/B sit on Z×Y and X×Y respectively).
    This attribute lets JS query stickers by ring membership without recomputing geometry at runtime.

    Stickers are individually addressable by id ("sticker-{FACE}-{POS}") and are wrapped in a
    .sticker-wrapper group for drop-shadow styling. The initial fill matches the face color so
    the static image looks correct until JS updates colors dynamically.

    <div class="container">

                    <line x1="3" y1="12" x2="21" y2="12"/>

                </svg>
            </button>
            <h1>Rubik's Cube</h1>
            <button id="about-button" class="about-button" aria-label="About this app">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="8"/>
                    <polyline points="11 11 12 11 12 16 13 16"/>
                </svg>
            </button>
        </div>
        <div class="main-content">
            <div class="controls-overlay" aria-hidden="true"></div>
            <div class="controls controls--desktop-collapsed">
                <div class="controls-header">
                    <span class="controls-title">Controls</span>

                    </button>
                </div>

                    <summary class="control-section-summary"><h2>Views</h2></summary>
                    <div class="control-section-body">
                        <div class="view-controls">
                            <!-- View checkboxes will be dynamically created here -->
                        </div>
                    </div>
                </details>

                <details class="control-section" data-persist open>
                    <summary class="control-section-summary"><h2>Theme</h2></summary>
                    <div class="control-section-body">
                        <fieldset class="theme-controls" aria-label="Theme preference">
                            <label class="theme-option">

                                <span>System</span>
                            </label>
                            <label class="theme-option">
                                <input type="radio" name="theme-preference" value="light">
                                <span>Light</span>
                            </label>
                            <label class="theme-option">
                                <input type="radio" name="theme-preference" value="dark">
                                <span>Dark</span>
                            </label>
                        </fieldset>
                    </div>
                </details>

                    <summary class="control-section-summary"><h2>Controls</h2></summary>
                    <div class="control-section-body">
                        <div id="controller-commands" class="button-grid"></div>
                    </div>
                </details>

                <details class="control-section" data-persist open>
                    <summary class="control-section-summary"><h2>Moves</h2></summary>
                    <div class="control-section-body">
                        <div id="global-move-commands" class="button-grid"></div>

                </details>

            </div>
