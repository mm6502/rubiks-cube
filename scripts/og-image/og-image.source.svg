<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image for Rubik's Cube project.
  Projection: orthographic with rotateX(-25°) rotateY(-35°) matching Basic view.
  Front face uses the same scrambled pattern as favicon.svg.
  Cube half-size h=30 → 60×60 face grid (3×3 of 20px cells).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#162a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="330" cy="315" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d1525" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="basic-view-cube-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="6" dy="10" stdDeviation="14" flood-color="slate" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!--
