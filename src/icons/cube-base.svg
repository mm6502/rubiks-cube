<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 180"
     width="200"
     height="180"
     fill="none"
     stroke="currentColor"
     stroke-width="1.5"
     stroke-linecap="round"
     stroke-linejoin="round">
    <rect width="200"
          height="180"
          fill="var(--bg)"
          stroke="none" />
    <defs>
        <g id="face-grid">
            <!-- 3x3 grid of rects with parameterized fill -->
            <rect x="0"
                  y="0"
                  width="20"
                  height="20"
                  fill="var(--c1, none)" />
            <rect x="20"
                  y="0"
                  width="20"
                  height="20"
                  fill="var(--c2, none)" />
            <rect x="40"
                  y="0"
                  width="20"
                  height="20"
                  fill="var(--c3, none)" />
            <rect x="0"
                  y="20"
                  width="20"
                  height="20"
                  fill="var(--c4, none)" />
            <rect x="20"
                  y="20"
                  width="20"
                  height="20"
                  fill="var(--c5, none)" />
            <rect x="40"
                  y="20"
                  width="20"
                  height="20"
                  fill="var(--c6, none)" />
            <rect x="0"
                  y="40"
                  width="20"
                  height="20"
                  fill="var(--c7, none)" />
            <rect x="20"
                  y="40"
                  width="20"
                  height="20"
                  fill="var(--c8, none)" />
            <rect x="40"
                  y="40"
                  width="20"
                  height="20"
                  fill="var(--c9, none)" />
        </g>
        <marker id="arrowhead"
                viewBox="0 0 10 10"
                refX="5"
                refY="5"
                markerWidth="30"
                markerHeight="30"
                orient="auto"
                markerUnits="userSpaceOnUse">
            <path d="M 0 0 L 10 5 L 0 10 z"
                  fill="currentColor" />
        </marker>
        <g id="base-arrow">
            <path d="M -60, 10 Q 0, 50 60, 10"
                  stroke="currentColor"
                  stroke-width="10"
                  fill="none"
                  marker-end="url(#arrowhead)" />
        </g>
        <g id="quarter-ccw-turn-arrow">
            <path d="M -40, 10 Q 0, 40 40, 10"
                  stroke="currentColor"
                  stroke-width="10"
                  fill="none"
                  marker-end="url(#arrowhead)" />
        </g>
        <g id="quarter-cw-turn-arrow">
            <path d="M 40, 10 Q 0, 40 -40, 10"
                  stroke="currentColor"
                  stroke-width="10"
                  fill="none"
                  marker-end="url(#arrowhead)" />
        </g>
        <g id="half-ccw-turn-arrow">
            <path d="M -40, 10 A 65 40 0 0 0 70 -45"
                  stroke="currentColor"
                  stroke-width="10"
                  fill="none"
                  marker-end="url(#arrowhead)" />
        </g>
        <g id="half-cw-turn-arrow">
            <path d="M 40, 10 A 65 40 0 0 1 -70, -45"
                  stroke="currentColor"
                  stroke-width="10"
                  fill="none"
                  marker-end="url(#arrowhead)" />
        </g>
        <!-- Layer Rotation Arrows -->
        <g id="arrow-x-0-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(-45, -25) rotate(120)" />
        </g>
        <g id="arrow-x-0-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(-45, -25) rotate(120)" />
        </g>
        <g id="arrow-x-0-180">
            <use href="#half-ccw-turn-arrow"
                 transform="translate(-35, -15) rotate(120)" />
        </g>
        <g id="arrow-x-2-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(45, 35) rotate(-60)" />
        </g>
        <g id="arrow-x-2-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(45, 35) rotate(-60)" />
        </g>
        <g id="arrow-x-2-180">
            <use href="#half-ccw-turn-arrow"
                 transform="translate(45, 35) rotate(-60)" />
        </g>
        <g id="arrow-y-0-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(0, 55)" />
        </g>
        <g id="arrow-y-0-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(0, 55)" />
        </g>
        <g id="arrow-y-0-180">
            <use href="#half-ccw-turn-arrow"
                 transform="translate(0, 55)" />
        </g>
        <g id="arrow-y-2-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(0, -40) rotate(180)" />
        </g>
        <g id="arrow-y-2-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(0, -40) rotate(180)" />
        </g>
        <g id="arrow-y-2-180">
            <use href="#half-ccw-turn-arrow"
                 transform="translate(0, -40) rotate(180)" />
        </g>
        <g id="arrow-z-0-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(-50, 30) rotate(60)" />
        </g>
        <g id="arrow-z-0-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(-50, 30) rotate(60)" />
        </g>
        <g id="arrow-z-0-180">
            <use href="#half-cw-turn-arrow"
                 transform="translate(-35, 30) rotate(60)" />
        </g>
        <g id="arrow-z-2-cw">
            <use href="#quarter-cw-turn-arrow"
                 transform="translate(45, -25) rotate(-120)" />
        </g>
        <g id="arrow-z-2-ccw">
            <use href="#quarter-ccw-turn-arrow"
                 transform="translate(45, -25) rotate(-120)" />
        </g>
        <g id="arrow-z-2-180">
            <use href="#half-cw-turn-arrow"
                 transform="translate(35, -15) rotate(-120)" />
        </g>
        <!-- Named Faces -->
        <g id="face-front">
            <use href="#face-grid"
                 transform="matrix(0.8, 0.364, 0, 1, -48, -21.84)" />
        </g>
        <g id="face-right">
            <use href="#face-grid"
                 transform="matrix(0.8, -0.364, 0, 1, 0, 0)" />
        </g>
        <g id="face-up">
            <use href="#face-grid"
                 transform="matrix(0.8, 0.364, -0.8, 0.364, 0, -43.68)" />
        </g>
        <!-- Cube Construction -->
        <g id="cube">
            <use href="#face-front"
                 style="--c1:var(--f1);--c2:var(--f2);--c3:var(--f3);--c4:var(--f4);--c5:var(--f5);--c6:var(--f6);--c7:var(--f7);--c8:var(--f8);--c9:var(--f9);" />
            <use href="#face-right"
                 style="--c1:var(--r1);--c2:var(--r2);--c3:var(--r3);--c4:var(--r4);--c5:var(--r5);--c6:var(--r6);--c7:var(--r7);--c8:var(--r8);--c9:var(--r9);" />
            <use href="#face-up"
                 style="--c1:var(--u1);--c2:var(--u2);--c3:var(--u3);--c4:var(--u4);--c5:var(--u5);--c6:var(--u6);--c7:var(--u7);--c8:var(--u8);--c9:var(--u9);" />
        </g>
    </defs>
    <g transform="translate(100, 85)">
        <use href="#cube" />
    </g>
</svg>